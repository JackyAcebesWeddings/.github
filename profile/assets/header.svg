<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" fill="none" role="img" aria-label="Cebu Weddings &amp; Events Planner by Jacky Acebes — Luxury Boutique Wedding Curation">
  <defs>
    <!-- Ivory background wash -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfcf9"/>
      <stop offset="1" stop-color="#f6f1e7"/>
    </linearGradient>

    <!-- Gold gradient for the title fill -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9e7a4b"/>
      <stop offset="0.5" stop-color="#c5a880"/>
      <stop offset="1" stop-color="#9e7a4b"/>
    </linearGradient>

    <!-- Moving highlight used for the shimmer sweep -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-500 0" to="500 0" dur="4s" begin="1.6s;sweep.end+2.5s"
        id="sweep" repeatCount="1"/>
    </linearGradient>

    <!-- Clip the shimmer to the title text shape -->
    <clipPath id="titleClip">
      <text x="450" y="152" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="46"
        font-weight="500" letter-spacing="2">Cebu Weddings &amp; Events Planner</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bg)"/>

  <!-- Center-drawn gold rules (top) -->
  <line x1="450" y1="40" x2="450" y2="40" stroke="#c5a880" stroke-width="1">
    <animate attributeName="x1" from="450" to="300" dur="1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="x2" from="450" to="600" dur="1s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </line>

  <!-- Eyebrow -->
  <text x="450" y="72" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="12" letter-spacing="6"
    fill="#c5a880" font-weight="bold" opacity="0">
    LUXURY BOUTIQUE WEDDING CURATION
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- Main title (gold fill) -->
  <text x="450" y="152" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-size="46"
    font-weight="500" letter-spacing="2" fill="url(#gold)" opacity="0">
    Cebu Weddings &amp; Events Planner
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.9s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
      from="0 12" to="0 0" dur="1s" begin="0.9s" fill="freeze"
      calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </text>

  <!-- Shimmer sweep, clipped to the title -->
  <g clip-path="url(#titleClip)">
    <rect x="0" y="110" width="900" height="60" fill="url(#shimmer)"/>
  </g>

  <!-- Byline -->
  <text x="450" y="186" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11" letter-spacing="7"
    fill="#9e7a4b" font-weight="bold" opacity="0">
    BY JACKY ACEBES
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="450" y="216" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-size="14"
    font-style="italic" fill="#7a7266" opacity="0">
    Synonymous with elegance, attention to detail &amp; exceptional service.
    <animate attributeName="opacity" from="0" to="0.95" dur="1s" begin="1.8s" fill="freeze"/>
  </text>

  <!-- Center-drawn gold rules (bottom) -->
  <line x1="450" y1="236" x2="450" y2="236" stroke="#c5a880" stroke-width="1">
    <animate attributeName="x1" from="450" to="360" dur="1s" begin="2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="x2" from="450" to="540" dur="1s" begin="2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </line>

  <!-- Twinkling sparkles -->
  <g fill="#c5a880">
    <circle cx="250" cy="120" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="128" r="1.8">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="200" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="605" cy="196" r="1.6">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
