<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cebu Weddings & Events Planner by Jacky Acebes">
  <defs>
    <!-- Soft cream backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f3"/>
      <stop offset="1" stop-color="#f4ede1"/>
    </linearGradient>

    <!-- Static gold for smaller text -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9e7a4b"/>
      <stop offset="0.5" stop-color="#c5a880"/>
      <stop offset="1" stop-color="#9e7a4b"/>
    </linearGradient>

    <!-- Moving shimmer sweep for the title -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b89568"/>
      <stop offset="0.45" stop-color="#b89568"/>
      <stop offset="0.5" stop-color="#f4e4c1"/>
      <stop offset="0.55" stop-color="#b89568"/>
      <stop offset="1" stop-color="#b89568"/>
      <animate attributeName="x1" values="-1;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg)"/>

  <!-- Ornamental corner frame, draws itself in -->
  <g stroke="url(#gold)" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M40 40 L40 90 M40 40 L90 40" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.4s" fill="freeze"/>
    </path>
    <path d="M960 40 L960 90 M960 40 L910 40" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.4s" begin="0.15s" fill="freeze"/>
    </path>
    <path d="M40 260 L40 210 M40 260 L90 260" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.4s" begin="0.3s" fill="freeze"/>
    </path>
    <path d="M960 260 L960 210 M960 260 L910 260" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.4s" begin="0.45s" fill="freeze"/>
    </path>
  </g>

  <!-- Floating sparkles -->
  <g fill="#c5a880">
    <circle cx="180" cy="90" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="95;80" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="110" r="1.8">
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="115;98" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="220" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="225;208" dur="4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="215" r="2.2">
      <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;203" dur="3.2s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="60" r="1.6">
      <animate attributeName="opacity" values="0;1;0" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="65;50" dur="3.6s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Eyebrow -->
  <text x="500" y="112" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="7" font-weight="bold" fill="url(#gold)" opacity="0">
    LUXURY BOUTIQUE WEDDING CURATION
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.6s" fill="freeze"/>
  </text>

  <!-- Title with shimmer -->
  <text x="500" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="2" fill="url(#shimmer)" opacity="0">
    Cebu Weddings &amp; Events Planner
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Byline -->
  <text x="500" y="198" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" letter-spacing="8" font-weight="bold" fill="url(#gold)" opacity="0">
    BY JACKY ACEBES
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Animated divider under byline -->
  <line x1="500" y1="222" x2="500" y2="222" stroke="url(#gold)" stroke-width="1.4">
    <animate attributeName="x1" from="500" to="380" dur="1s" begin="1.4s" fill="freeze"/>
    <animate attributeName="x2" from="500" to="620" dur="1s" begin="1.4s" fill="freeze"/>
  </line>
  <circle cx="500" cy="222" r="3" fill="#c5a880" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.8s" fill="freeze"/>
  </circle>

  <!-- Tagline -->
  <text x="500" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#7a6a52" opacity="0">
    Synonymous with elegance, attention to detail, and exceptional service.
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="2s" fill="freeze"/>
  </text>
</svg>
